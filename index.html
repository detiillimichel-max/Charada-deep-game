<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Que é, O Que é? - Jogo de Adivinhas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
        }

        #game-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid #e0e0e0;
            min-height: 250px;
            display: flex;
            flex-direction: column;
        }

        .card:hover:not(.revealed) {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .card.revealed {
            background: linear-gradient(135deg, #e8eaf6, #c5cae9);
            cursor: default;
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .riddle {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
            flex-grow: 1;
        }

        .answer {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            color: #764ba2;
            font-weight: bold;
            border-left: 4px solid #764ba2;
        }

        .card.revealed .answer {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal-hint {
            margin-top: 15px;
            font-size: 0.85em;
            color: #667eea;
            text-align: center;
        }

        .card.revealed .reveal-hint {
            display: none;
        }

        .reset-btn {
            display: block;
            width: 220px;
            margin: 0 auto;
            padding: 14px 35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .reset-btn:hover {
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            #game-container { grid-template-columns: 1fr; }
            .score-board { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 O Que é, O Que é? 🧩</h1>
            <p>Descubra a resposta de cada charada!</p>
        </header>

        <div class="score-board">
            <span>🎯 Acertos: <span id="score">0</span></span>
            <span>📊 Total: <span id="total">9</span></span>
        </div>

        <div id="game-container"></div>

        <button id="reset-btn" class="reset-btn">🔄 Jogar Novamente</button>
    </div>

    <footer>
        <p>Criado com ❤️ - Clique nos cards para revelar as respostas!</p>
    </footer>

    <script>
        // ==================== DADOS DO JOGO ====================
        const riddles = [
            { riddle: "O que é, o que é? Tem cabeça mas não pensa, tem boca mas não fala?", answer: "O relógio ⏰" },
            { riddle: "O que é, o que é? Quanto mais se tira, maior fica?", answer: "O buraco 🕳️" },
            { riddle: "O que é, o que é? Tem dentes mas não come, tem barba mas não é homem?", answer: "O alho 🧄" },
            { riddle: "O que é, o que é? Passa pelo mar e não se molha, passa pelo fogo e não se queima?", answer: "A sombra 🌑" },
            { riddle: "O que é, o que é? Tem asas mas não voa, tem boca mas não fala, tem patas mas não anda?", answer: "A mesa 🪑" },
            { riddle: "O que é, o que é? Cai em pé e corre deitado?", answer: "A chuva 🌧️" },
            { riddle: "O que é, o que é? É irmão do pai da minha prima, mas não é meu tio?", answer: "Meu pai 👨" },
            { riddle: "O que é, o que é? Entra na água mas não se molha, entra no fogo mas não se queima?", answer: "O gelo 🧊" },
            { riddle: "O que é, o que é? Quanto maior menos se vê?", answer: "A escuridão 🌌" }
        ];

        // ==================== ESTADO DO JOGO ====================
        let gameState = {
            score: 0,
            revealed: new Array(9).fill(false)
        };

        // ==================== ELEMENTOS DOM ====================
        const gameContainer = document.getElementById('game-container');
        const scoreElement = document.getElementById('score');
        const totalElement = document.getElementById('total');
        const resetBtn = document.getElementById('reset-btn');

        // ==================== FUNÇÕES ====================
        function updateScoreUI() {
            scoreElement.textContent = gameState.score;
        }

        function saveGame() {
            localStorage.setItem('charada_game', JSON.stringify({
                score: gameState.score,
                revealed: gameState.revealed
            }));
        }

        function loadGame() {
            const saved = localStorage.getItem('charada_game');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    gameState.score = data.score || 0;
                    gameState.revealed = data.revealed || new Array(9).fill(false);
                    updateScoreUI();
                } catch(e) {
                    console.log('Erro ao carregar jogo:', e);
                }
            }
        }

        function revealCard(index) {
            if (!gameState.revealed[index]) {
                gameState.revealed[index] = true;
                gameState.score++;
                updateScoreUI();
                saveGame();
                renderCards();
                
                if (gameState.score === 9) {
                    setTimeout(() => {
                        alert('🎉 PARABÉNS! 🎉\n\nVocê completou todas as 9 charadas!\nClique em "Jogar Novamente" para recomeçar.');
                    }, 100);
                }
            }
        }

        function renderCards() {
            if (!gameContainer) return;
            
            gameContainer.innerHTML = '';
            
            riddles.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `card ${gameState.revealed[index] ? 'revealed' : ''}`;
                
                const emojis = ['1️⃣', '2️⃣', '3️⃣', '4️⃣', '5️⃣', '6️⃣', '7️⃣', '8️⃣', '9️⃣'];
                
                card.innerHTML = `
                    <h3>${emojis[index]} Charada ${index + 1}</h3>
                    <div class="riddle">❓ ${item.riddle}</div>
                    <div class="answer">
                        💡 <strong>Resposta:</strong> ${item.answer}
                    </div>
                    ${!gameState.revealed[index] ? '<div class="reveal-hint">🔍 Clique para revelar a resposta</div>' : '✅ Resposta revelada!'}
                `;
                
                if (!gameState.revealed[index]) {
                    card.addEventListener('click', () => revealCard(index));
                }
                
                gameContainer.appendChild(card);
            });
        }

        function resetGame() {
            if (confirm('⚠️ Tem certeza? Todo seu progresso será perdido!')) {
                gameState = {
                    score: 0,
                    revealed: new Array(9).fill(false)
                };
                updateScoreUI();
                saveGame();
                renderCards();
                
                // Animação de feedback
                const btn = resetBtn;
                btn.style.transform = 'scale(0.95)';
                setTimeout(() => { btn.style.transform = 'scale(1)'; }, 200);
            }
        }

        // ==================== INICIALIZAÇÃO ====================
        function init() {
            totalElement.textContent = '9';
            loadGame();
            renderCards();
            resetBtn.addEventListener('click', resetGame);
            console.log('🎮 Jogo carregado! Clique nos cards para jogar.');
        }

        // Garantir que o DOM está carregado
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
