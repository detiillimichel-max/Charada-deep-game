<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Adivinhas">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>O Que é, O Que é? - Jogo de Adivinhas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 O Que é, O Que é? 🧩</h1>
            <p>Descubra a resposta de cada charada!</p>
        </header>

        <div class="install-banner" id="installBanner" style="display: none;">
            <span>📱 Instale nosso app!</span>
            <button id="installBtn">Instalar</button>
            <button id="closeInstallBtn">✕</button>
        </div>

        <div class="score-board">
            <span>🎯 Acertos: <span id="score">0</span></span>
            <span>📊 Total: <span id="total">9</span></span>
            <span>📶 <span id="onlineStatus">Online</span></span>
        </div>

        <div id="game-container">
            <!-- Cards serão inseridos aqui via JS -->
        </div>

        <button id="reset-btn" class="reset-btn">🔄 Jogar Novamente</button>
    </div>

    <footer>
        <p>Criado com ❤️ - Disponível offline! 🚀</p>
    </footer>

    <script src="js/game.js"></script>
    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('[PWA] SW registrado com sucesso:', registration);
                        
                        // Verificar atualizações
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('[PWA] Nova versão encontrada!');
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showUpdateNotification();
                                }
                            });
                        });
                    })
                    .catch(error => {
                        console.error('[PWA] Erro ao registrar SW:', error);
                    });
            });
        }

        // Mostrar notificação de atualização
        function showUpdateNotification() {
            const updateNotification = document.createElement('div');
            updateNotification.className = 'update-notification';
            updateNotification.innerHTML = `
                <span>🔄 Nova versão disponível!</span>
                <button onclick="location.reload()">Atualizar</button>
            `;
            document.body.appendChild(updateNotification);
            setTimeout(() => updateNotification.remove(), 10000);
        }

        // Detectar status online/offline
        function updateOnlineStatus() {
            const statusSpan = document.getElementById('onlineStatus');
            if (navigator.onLine) {
                statusSpan.textContent = 'Online 🌐';
                statusSpan.style.color = '#4caf50';
            } else {
                statusSpan.textContent = 'Offline 📴';
                statusSpan.style.color = '#ff9800';
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // Instalação do PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBanner').style.display = 'flex';
        });

        document.getElementById('installBtn')?.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('[PWA] Usuário aceitou instalação');
                    document.getElementById('installBanner').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        document.getElementById('closeInstallBtn')?.addEventListener('click', () => {
            document.getElementById('installBanner').style.display = 'none';
        });
    </script>
</body>
</html>
