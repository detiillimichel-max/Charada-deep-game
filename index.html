<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Que é, O Que é? - Jogo de Adivinhas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 O Que é, O Que é? 🧩</h1>
            <p>Descubra a resposta de cada charada!</p>
        </header>

        <div class="score-board">
            <span>🎯 Acertos: <span id="score">0</span></span>
            <span>📊 Total: <span id="total">9</span></span>
        </div>

        <div id="game-container">
            <!-- Cards serão inseridos aqui via JS -->
        </div>

        <button id="reset-btn" class="reset-btn">🔄 Jogar Novamente</button>
    </div>

    <footer>
        <p>Criado com ❤️ - Cada resposta revela uma surpresa!</p>
    </footer>

    <script src="js/game.js"></script>
</body>
</html>
